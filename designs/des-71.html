<!DOCTYPE html>
<html lang="nl"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f0;color:#1a1a1a;font-family:'Work Sans',sans-serif;overflow:hidden;height:100vh;width:100vw}
.grid{position:absolute;inset:0;z-index:0;display:grid;grid-template-columns:2fr 1fr 3fr 1fr;grid-template-rows:3fr 1fr 2fr 1fr;gap:4px;padding:4px}
.cell{border:3px solid #1a1a1a}
.r{background:#dc2626}.b{background:#1d4ed8}.y{background:#eab308}.w{background:#f5f5f0}
.content{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;justify-content:center;padding:0 7%;max-width:620px}
h1{font-size:clamp(2.5rem,5vw,4.5rem);font-weight:900;line-height:1.05;letter-spacing:-2px;margin-bottom:14px}
h1 span{color:#dc2626}
.desc{font-size:12px;color:rgba(26,26,26,0.5);line-height:1.8;max-width:460px;margin-bottom:32px}
.search{display:flex;background:#fff;border:3px solid #1a1a1a;max-width:480px}
.search input{flex:1;background:transparent;border:none;outline:none;color:#1a1a1a;font-size:12px;padding:14px 16px}
.search input::placeholder{color:rgba(26,26,26,0.2)}
.search button{background:#1d4ed8;border:none;color:#fff;cursor:pointer;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:14px 22px;white-space:nowrap}
.stats{display:flex;gap:32px;margin-top:28px}
.stat{display:flex;flex-direction:column;gap:4px}
.sv{font-size:22px;font-weight:900;color:#dc2626}
.sl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:rgba(26,26,26,0.3)}
.bottom{position:absolute;bottom:0;left:0;right:0;z-index:20;height:32px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;gap:32px}
.bi{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4)}
</style></head>
<body>
<div class="grid"><div class="cell r"></div><div class="cell w"></div><div class="cell w"></div><div class="cell b"></div><div class="cell w"></div><div class="cell y"></div><div class="cell w"></div><div class="cell w"></div><div class="cell w"></div><div class="cell w"></div><div class="cell r"></div><div class="cell w"></div><div class="cell b"></div><div class="cell w"></div><div class="cell w"></div><div class="cell y"></div></div>
<div class="content">
  <h1>Compositie<br/>in <span>data.</span></h1>
  <p class="desc">De Stijl: primaire kleuren, absolute helderheid. 47 databases, proprietary multi-model intelligence engine, zero retentie.</p>
  <div class="search"><input type="text" placeholder="Entiteit of KvK-nummer..."/><button>Analyseer →</button></div>
  <div class="stats"><div class="stat"><div class="sv">47</div><div class="sl">Databases</div></div><div class="stat"><div class="sv">&lt;3m</div><div class="sl">Rapport</div></div><div class="stat"><div class="sv">Multi</div><div class="sl">Lagen</div></div><div class="stat"><div class="sv">∅</div><div class="sl">Retentie</div></div></div>
</div>
<div class="bottom"><div class="bi">AVG Art. 25</div><div class="bi">Zero-Retention</div><div class="bi">AES-256</div><div class="bi">EU AI Act</div></div>
</body></html>
