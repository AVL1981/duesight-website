<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020510;color:#dce8ff;font-family:'Space Grotesk',sans-serif;overflow:hidden;height:100vh;width:100vw}
canvas#bg{position:absolute;inset:0;z-index:0}
.overlay{position:absolute;inset:0;z-index:1;background:radial-gradient(ellipse 80% 70% at 50% 50%,transparent 20%,rgba(2,5,16,0.6) 60%,rgba(2,5,16,0.95) 100%)}
.content{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 5%}
.eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.eb-line{width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(173,198,255,0.5))}
.eb-text{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:rgba(173,198,255,0.5)}
h1{font-family:'Manrope',sans-serif;font-size:clamp(2.5rem,5.5vw,5rem);font-weight:800;line-height:1.05;letter-spacing:-2px;color:#fff;margin-bottom:6px}
h1 span{color:transparent;background:linear-gradient(135deg,#60a5fa,#818cf8,#a78bfa);-webkit-background-clip:text;background-clip:text}
.sub{font-size:12px;color:rgba(180,200,240,0.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:40px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.sub b{color:rgba(173,198,255,0.7)}
.search-wrap{position:relative;max-width:560px;width:100%;margin-bottom:36px}
.search-glow{position:absolute;inset:-2px;border-radius:6px;background:linear-gradient(135deg,rgba(96,165,250,0.3),rgba(167,139,250,0.2));filter:blur(12px);opacity:0.5;animation:sglow 3s ease-in-out infinite}
@keyframes sglow{0%,100%{opacity:0.3}50%{opacity:0.6}}
.search{position:relative;display:flex;background:rgba(5,12,30,0.85);border:1px solid rgba(96,165,250,0.2);border-radius:4px;backdrop-filter:blur(20px)}
.search input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:13px;padding:14px 18px}
.search input::placeholder{color:rgba(150,180,220,0.25)}
.search button{background:linear-gradient(135deg,#4d8eff,#6366f1);border:none;color:#fff;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:14px 24px;white-space:nowrap;transition:opacity 0.2s}
.search button:hover{opacity:0.85}
.stats{display:flex;gap:40px;margin-bottom:32px}
.stat{display:flex;flex-direction:column;align-items:center;gap:6px}
.stat-v{font-family:'Manrope',sans-serif;font-size:24px;font-weight:800;color:#60a5fa}
.stat-l{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:rgba(150,180,220,0.3)}
.jurisdictions{display:flex;gap:8px}
.jur{font-size:8px;letter-spacing:2px;padding:4px 12px;border:1px solid rgba(96,165,250,0.15);color:rgba(150,180,220,0.4);text-transform:uppercase}
.jur.active{border-color:rgba(96,165,250,0.35);color:rgba(173,198,255,0.7)}
.bottom{position:absolute;bottom:0;left:0;right:0;z-index:20;height:32px;background:rgba(2,5,16,0.9);border-top:1px solid rgba(96,165,250,0.08);display:flex;align-items:center;justify-content:center;gap:32px}
.bi{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:rgba(96,165,250,0.25)}
.bi.live::before{content:'● ';color:#22c55e}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="overlay"></div>
<div class="content">
  <div class="eyebrow"><div class="eb-line"></div><div class="eb-text">Intelligent Infrastructure · Europa</div><div class="eb-line" style="background:linear-gradient(90deg,rgba(173,198,255,0.5),transparent)"></div></div>
  <h1>Due Diligence.<br/><span>Zonder Compromise.</span></h1>
  <div class="sub"><span><b>6</b> analyselagen</span><span style="color:rgba(100,140,200,0.2)">·</span><span><b>10</b> validatieprotocollen</span><span style="color:rgba(100,140,200,0.2)">·</span><span><b>Zero</b> data-retentie</span></div>
  <div class="search-wrap"><div class="search-glow"></div><div class="search"><input type="text" placeholder="Voer bedrijfsnaam of KVK-nummer in..."/><button>Analyse Starten</button></div></div>
  <div class="stats">
    <div class="stat"><div class="stat-v">meerdere</div><div class="stat-l">Bronnen</div></div>
    <div class="stat"><div class="stat-v">&lt;3 min</div><div class="stat-l">Rapport</div></div>
    <div class="stat"><div class="stat-v">11</div><div class="stat-l">analyselagen</div></div>
    <div class="stat"><div class="stat-v">∅</div><div class="stat-l">Retentie</div></div>
  </div>
  <div class="jurisdictions">
    <div class="jur active">NL</div><div class="jur active">DE</div><div class="jur active">AT</div><div class="jur active">CH</div><div class="jur">BE</div><div class="jur">UK</div>
  </div>
</div>
<div class="bottom">
  <div class="bi live">Systeem Operationeel</div>
  <div class="bi">AVG Art. 25</div>
  <div class="bi">Zero-Retention</div>
  <div class="bi">TLS 1.3 + AES-256</div>
  <div class="bi">EU AI Act context</div>
</div>
<script>
var c=document.getElementById('bg'),ctx=c.getContext('2d'),W,H;
function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// Constellation network — animated particles + connections
var nodes=[],connections=[];
for(var i=0;i<80;i++){
  nodes.push({
    x:Math.random(),y:Math.random(),
    vx:(Math.random()-0.5)*0.0003,vy:(Math.random()-0.5)*0.0003,
    r:Math.random()*2+0.5,
    a:Math.random()*0.6+0.1,
    pulse:Math.random()*Math.PI*2,
    speed:Math.random()*0.02+0.01,
    color:Math.random()>0.7?'rgba(167,139,250,':'rgba(96,165,250,'
  });
}
// Named city nodes — larger, brighter
var cities=[
  {x:0.45,y:0.35,label:'AMS',r:4,color:'rgba(96,165,250,'},
  {x:0.52,y:0.42,label:'FRA',r:3.5,color:'rgba(96,165,250,'},
  {x:0.50,y:0.50,label:'ZRH',r:3.5,color:'rgba(245,158,11,'},
  {x:0.56,y:0.48,label:'VIE',r:3,color:'rgba(245,158,11,'},
  {x:0.44,y:0.40,label:'BRU',r:3,color:'rgba(96,165,250,'},
  {x:0.38,y:0.32,label:'LON',r:4,color:'rgba(167,139,250,'},
];
cities.forEach(function(c){c.a=0.9;c.pulse=Math.random()*Math.PI*2;c.speed=0.015;c.vx=0;c.vy=0;nodes.push(c)});

var t=0;
function draw(){
  t+=0.01;
  ctx.fillStyle='rgba(2,5,16,0.15)';
  ctx.fillRect(0,0,W,H);

  // Star field (static layer)
  if(!draw.stars){
    draw.stars=[];
    for(var i=0;i<300;i++) draw.stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*0.8+0.2,a:Math.random()*0.3+0.05});
    // Draw once to a pattern
    ctx.fillStyle='#020510';ctx.fillRect(0,0,W,H);
    draw.stars.forEach(function(s){
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(180,200,255,'+s.a+')';ctx.fill();
    });
  }

  // Move nodes
  nodes.forEach(function(n){
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<0||n.x>1)n.vx*=-1;
    if(n.y<0||n.y>1)n.vy*=-1;
    n.pulse+=n.speed;
  });

  // Draw connections between nearby nodes
  for(var i=0;i<nodes.length;i++){
    for(var j=i+1;j<nodes.length;j++){
      var dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<0.15){
        var alpha=Math.max(0,(0.15-dist)/0.15)*0.15;
        ctx.beginPath();
        ctx.moveTo(nodes[i].x*W,nodes[i].y*H);
        ctx.lineTo(nodes[j].x*W,nodes[j].y*H);
        ctx.strokeStyle='rgba(96,165,250,'+alpha+')';
        ctx.lineWidth=0.5;ctx.stroke();
      }
    }
  }

  // Draw data flow pulses on connections between cities
  for(var i=0;i<cities.length;i++){
    for(var j=i+1;j<cities.length;j++){
      var a=cities[i],b=cities[j];
      var progress=(Math.sin(t*1.5+i+j)+1)/2;
      var px=a.x+(b.x-a.x)*progress;
      var py=a.y+(b.y-a.y)*progress;
      // Connection line
      ctx.beginPath();ctx.moveTo(a.x*W,a.y*H);ctx.lineTo(b.x*W,b.y*H);
      ctx.strokeStyle='rgba(96,165,250,0.06)';ctx.lineWidth=0.8;ctx.stroke();
      // Data pulse dot
      var pg=ctx.createRadialGradient(px*W,py*H,0,px*W,py*H,4);
      pg.addColorStop(0,'rgba(173,198,255,0.8)');pg.addColorStop(1,'rgba(96,165,250,0)');
      ctx.beginPath();ctx.arc(px*W,py*H,4,0,Math.PI*2);
      ctx.fillStyle=pg;ctx.fill();
    }
  }

  // Draw nodes
  nodes.forEach(function(n){
    var x=n.x*W,y=n.y*H;
    var pulseA=n.a*(0.7+Math.sin(n.pulse)*0.3);
    var r=n.r||1.5;
    // Glow
    var g=ctx.createRadialGradient(x,y,0,x,y,r*4);
    g.addColorStop(0,(n.color||'rgba(96,165,250,')+pulseA+')');
    g.addColorStop(1,(n.color||'rgba(96,165,250,')+'0)');
    ctx.beginPath();ctx.arc(x,y,r*4,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
    // Core
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=(n.color||'rgba(96,165,250,')+pulseA+')';ctx.fill();
    // Label
    if(n.label){
      ctx.font='7px Space Grotesk';
      ctx.fillStyle='rgba(173,198,255,0.5)';
      ctx.fillText(n.label,x+r+4,y+3);
    }
  });

  // Subtle nebula glow in center
  var ng=ctx.createRadialGradient(W*0.5,H*0.45,0,W*0.5,H*0.45,W*0.35);
  ng.addColorStop(0,'rgba(96,165,250,0.03)');
  ng.addColorStop(0.5,'rgba(139,92,246,0.02)');
  ng.addColorStop(1,'transparent');
  ctx.fillStyle=ng;ctx.fillRect(0,0,W,H);

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
