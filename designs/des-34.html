<!DOCTYPE html>
<html lang="nl"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Space Grotesk',sans-serif;overflow:hidden;height:100vh;width:100vw}
.content{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;justify-content:center;padding:0 7%}
h1{font-family:'Anton',sans-serif;font-size:clamp(4rem,10vw,10rem);line-height:0.9;letter-spacing:-2px;color:#fff;margin-bottom:20px;text-transform:uppercase}
.desc{font-size:12px;color:rgba(255,255,255,0.3);line-height:1.8;max-width:500px;margin-bottom:24px;font-weight:300;text-transform:uppercase;letter-spacing:2px}
.search{display:flex;background:transparent;border:3px solid #fff;max-width:500px}
.search input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:'Anton',sans-serif;font-size:14px;padding:16px 20px;text-transform:uppercase;letter-spacing:1px}
.search input::placeholder{color:rgba(255,255,255,0.15)}
.search button{background:#fff;border:none;color:#000;cursor:pointer;font-family:'Anton',sans-serif;font-size:14px;padding:16px 28px;text-transform:uppercase;letter-spacing:2px}
.stats{display:flex;gap:40px;margin-top:32px}
.stat{display:flex;flex-direction:column;gap:2px}
.sv{font-family:'Anton',sans-serif;font-size:32px;color:#fff}
.sl{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.2)}
.rule{width:80px;height:3px;background:#fff;margin:24px 0}
.bottom{position:absolute;bottom:0;left:0;right:0;z-index:20;height:40px;background:#fff;display:flex;align-items:center;justify-content:center;gap:40px}
.bi{font-family:'Anton',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#000}
</style></head>
<body>
<div class="content">
  <h1>DUE<br/>DILI<br/>GENCE.</h1>
  <div class="rule"></div>
  <p class="desc">Geen franje. Alleen feiten. 47 databases. proprietary multi-model intelligence engine. Zero retentie. Pre-due diligence intelligence voor professionals die resultaat eisen.</p>
  <div class="search"><input type="text" placeholder="BEDRIJF OF KVK-NUMMER"/><button>SCAN</button></div>
  <div class="stats">
    <div class="stat"><div class="sv">47</div><div class="sl">Databases</div></div>
    <div class="stat"><div class="sv">&lt;3M</div><div class="sl">Rapport</div></div>
    <div class="stat"><div class="sv">Multi</div><div class="sl">Lagen</div></div>
    <div class="stat"><div class="sv">∅</div><div class="sl">Retentie</div></div>
  </div>
</div>
<div class="bottom">
  <div class="bi">AVG Art. 25</div><div class="bi">Zero-Retention</div><div class="bi">AES-256</div><div class="bi">EU AI Act</div>
</div>
</body></html>
