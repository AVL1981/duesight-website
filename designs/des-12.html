<!DOCTYPE html>
<html class="dark" lang="nl">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#06080f;
  color:#c8b67a;
  font-family:'Space Grotesk',sans-serif;
  overflow:hidden;height:100vh;width:100vw;
}

/* Animated topographic background */
canvas#topo{position:absolute;inset:0;z-index:0;opacity:0.6;}

/* Dark vignette overlay */
.vignette{
  position:absolute;inset:0;z-index:1;
  background:radial-gradient(ellipse 80% 80% at 50% 50%, transparent 20%, rgba(6,8,15,0.6) 70%, rgba(6,8,15,0.95) 100%);
}

/* Gold grain texture overlay */
.grain{
  position:absolute;inset:0;z-index:2;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Content */
.content{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px;}

.crown-line{
  display:flex;align-items:center;gap:16px;margin-bottom:20px;
  font-size:8px;letter-spacing:5px;text-transform:uppercase;
  color:rgba(200,182,122,0.45);
}
.crown-line::before,.crown-line::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg, transparent, rgba(200,182,122,0.3), transparent);
}

h1{
  font-family:'Cinzel',serif;
  font-size:clamp(2rem,5vw,4rem);
  font-weight:700;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#c8b67a;
  text-shadow:0 0 40px rgba(200,182,122,0.2);
  margin-bottom:8px;
  line-height:1.1;
}
.sub-title{
  font-family:'Cinzel',serif;
  font-size:clamp(0.7rem,1.5vw,1rem);
  letter-spacing:6px;
  color:rgba(200,182,122,0.4);
  text-transform:uppercase;
  margin-bottom:40px;
}

/* Command panel */
.command-panel{
  background:rgba(8,12,22,0.85);
  border:1px solid rgba(200,182,122,0.2);
  border-top:2px solid rgba(200,182,122,0.4);
  padding:32px 40px;
  max-width:600px;
  width:100%;
  backdrop-filter:blur(20px);
  position:relative;
}
.command-panel::before{
  content:'DUESIGHT INTELLIGENCE PROTOCOL';
  position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  font-size:7px;letter-spacing:3px;background:#06080f;padding:0 12px;
  color:rgba(200,182,122,0.5);white-space:nowrap;
}

.search-row{display:flex;gap:0;border:1px solid rgba(200,182,122,0.2);}
.search-row input{
  flex:1;background:rgba(4,6,12,0.8);
  border:none;outline:none;color:#c8b67a;
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;padding:14px 18px;
  letter-spacing:0.5px;
}
.search-row input::placeholder{color:rgba(200,182,122,0.25);}
.search-row button{
  background:rgba(200,182,122,0.1);
  border:none;border-left:1px solid rgba(200,182,122,0.2);
  color:#c8b67a;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;
  font-size:8px;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;padding:14px 22px;
  transition:background 0.2s;white-space:nowrap;
}
.search-row button:hover{background:rgba(200,182,122,0.2);}

/* Stats */
.stats-row{
  display:flex;justify-content:space-between;
  margin-top:24px;padding-top:24px;
  border-top:1px solid rgba(200,182,122,0.1);
}
.stat{display:flex;flex-direction:column;align-items:center;gap:6px;}
.stat-n{
  font-family:'Cinzel',serif;font-size:20px;font-weight:600;
  color:#c8b67a;
}
.stat-l{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:rgba(200,182,122,0.35);}

/* Jurisdictions */
.jurisdictions{
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:20px;
}
.jur{
  font-size:7px;letter-spacing:2px;text-transform:uppercase;
  padding:5px 12px;border:1px solid rgba(200,182,122,0.15);
  color:rgba(200,182,122,0.45);
}

/* Corner decorations */
.corner{position:absolute;width:20px;height:20px;z-index:20;}
.corner.tl{top:20px;left:20px;border-top:1px solid rgba(200,182,122,0.3);border-left:1px solid rgba(200,182,122,0.3);}
.corner.tr{top:20px;right:20px;border-top:1px solid rgba(200,182,122,0.3);border-right:1px solid rgba(200,182,122,0.3);}
.corner.bl{bottom:20px;left:20px;border-bottom:1px solid rgba(200,182,122,0.3);border-left:1px solid rgba(200,182,122,0.3);}
.corner.br{bottom:20px;right:20px;border-bottom:1px solid rgba(200,182,122,0.3);border-right:1px solid rgba(200,182,122,0.3);}

/* Coordinate badge */
.coords{
  position:absolute;bottom:24px;right:24px;z-index:20;
  font-size:7px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(200,182,122,0.25);
}
</style>
</head>
<body>

<canvas id="topo"></canvas>
<div class="vignette"></div>
<div class="grain"></div>

<!-- Corner decorations -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="content">
  <div class="crown-line">Institutioneel Vertrouwensniveau</div>

  <h1>Imperium<br/>Intelligence</h1>
  <div class="sub-title">Pre-Due Diligence · Europa · DACH</div>

  <div class="command-panel">
    <div class="search-row">
      <input type="text" placeholder="Entiteit, KvK-nummer of jurisdictie..."/>
      <button>Initieer →</button>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-n">meerdere</div>
        <div class="stat-l">Bronnen</div>
      </div>
      <div class="stat">
        <div class="stat-n">6</div>
        <div class="stat-l">Jurisdicties</div>
      </div>
      <div class="stat">
        <div class="stat-n">11</div>
        <div class="stat-l">analyselagen</div>
      </div>
      <div class="stat">
        <div class="stat-n">0</div>
        <div class="stat-l">Data Retentie</div>
      </div>
    </div>

    <div class="jurisdictions">
      <div class="jur">Nederland</div>
      <div class="jur">Deutschland</div>
      <div class="jur">Österreich</div>
      <div class="jur">Schweiz</div>
      <div class="jur">België</div>
      <div class="jur">United Kingdom</div>
    </div>
  </div>
</div>

<div class="coords">52.3676° N · 4.9041° E · AMS_NODE_01</div>

<script>
var canvas = document.getElementById('topo');
var ctx = canvas.getContext('2d');
var W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

// Generate animated topographic lines
var lines = [];
var numLines = 40;
for(var i=0;i<numLines;i++){
  var pts = [];
  var y0 = (i/numLines)*H + (Math.random()-0.5)*40;
  for(var x=0;x<=W;x+=20){
    pts.push({
      x:x,
      y:y0,
      oy:y0,
      amp:20+Math.random()*60,
      freq:0.002+Math.random()*0.004,
      phase:Math.random()*Math.PI*2,
      speed:0.0005+Math.random()*0.001
    });
  }
  lines.push({pts:pts, opacity:0.15+Math.random()*0.3, width:Math.random()<0.1?1.5:0.5});
}

var t=0;
function draw(){
  t+=0.005;
  ctx.clearRect(0,0,W,H);

  lines.forEach(function(line){
    ctx.beginPath();
    line.pts.forEach(function(p,i){
      var y = p.oy + Math.sin(p.x*p.freq + t*p.speed*1000 + p.phase)*p.amp;
      if(i===0) ctx.moveTo(p.x,y);
      else ctx.lineTo(p.x,y);
    });
    ctx.strokeStyle='rgba(180,150,60,'+line.opacity+')';
    ctx.lineWidth=line.width;
    ctx.stroke();
  });

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
